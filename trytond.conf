[database]
# URI 格式: driver://user:password@host:port/dbname
uri = postgresql://tryton:tryton_password@postgres:5432/tryton
# 連線池大小
pool_size = 20
# 查詢超時（秒）
timeout = 3600

[web]
# 監聽地址
listen = 0.0.0.0:8000
# hostname 和 port
hostname = localhost
port = 8000
root = /var/lib/trytond/www

[session]
# Session 超時（秒）
timeout = 2592000
# 啟用 cookie
cookie = True
# Cookie 超時
cookie_timeout = 2592000

[jsonrpc]
# 啟用 JSON-RPC
listen = 0.0.0.0:8000

[log]
# 日誌級別: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s

[email]
# 電郵設定（可選）
# uri = smtps://user:password@smtp.example.com:465/?local-hostname=localhost

[file]
# 檔案存儲位置
path = /var/lib/trytond/files

